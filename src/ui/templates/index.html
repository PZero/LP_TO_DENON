<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP to Denon - Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Blurred album cover background when connected -->
    <div class="background-cover-art" id="bg-cover-art" style="background-image: url('{{ url_for('static', filename='cover.jpg') }}');"></div>
    <div class="background-glow"></div>
    
    <div class="container">
        <header>
            <div class="logo">LP <span>TO</span> DENON</div>
            <div class="subtitle">System Status Monitor</div>
        </header>

        <main>
            <!-- Mode 1: Searching -->
            <div id="state-searching" class="status-panel active">
                <div class="radar-container">
                    <div class="radar-circle ring-1"></div>
                    <div class="radar-circle ring-2"></div>
                    <div class="radar-circle ring-3"></div>
                    <div class="radar-center">
                        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M7 7l10 10-5 5V2l5 5L7 17"/>
                        </svg>
                    </div>
                </div>
                <div class="status-info">
                    <h2 class="pulsing-text">Ricerca Giradischi...</h2>
                    <p class="desc">Accendi il giradischi Bluetooth per avviare il collegamento automatico</p>
                </div>
            </div>

            <!-- Mode 2: Connected -->
            <div id="state-connected" class="status-panel">
                <div class="player-layout">
                    <!-- Left: Vinyl & Album Art -->
                    <div class="player-left">
                        <div class="album-display">
                            <div class="album-sleeve">
                                <div class="cover-art">
                                    <img src="{{ url_for('static', filename='cover.jpg') }}" alt="Paolo Conte - Collezione">
                                </div>
                            </div>
                            <div class="vinyl-spin-container">
                                <div class="vinyl">
                                    <div class="vinyl-grooves"></div>
                                    <div class="vinyl-label">
                                        <div class="vinyl-label-center"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="playback-controls">
                            <div class="badge-connected">CONNESSO</div>
                            <h3 id="current-track-title">In attesa dell'avvio...</h3>
                            <div class="progress-container">
                                <span id="time-elapsed">0:00</span>
                                <div class="progress-bar-bg">
                                    <div class="progress-bar-fill" id="track-progress"></div>
                                </div>
                                <span id="time-total">0:00</span>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Tracklist -->
                    <div class="player-right">
                        <div class="tracklist-header">
                            <h3>PAOLO CONTE - COLLEZIONE</h3>
                            <div class="side-selector">
                                <button class="side-btn active" id="btn-side-a" onclick="switchSide('A')">LATO A</button>
                                <button class="side-btn" id="btn-side-b" onclick="switchSide('B')">LATO B</button>
                            </div>
                        </div>
                        <div class="tracklist" id="tracklist-container">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>

                <div class="equalizer">
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                </div>
            </div>
        </main>
        
        <footer>
            <div class="connection-status">
                <span class="status-dot green"></span>
                <span id="output-sink-name">HDMI Audio: PCM Stereo 48kHz</span>
            </div>
            <div class="host-info" id="ip-info">
                Caricamento...
            </div>
        </footer>
    </div>

    <script>
        let currentStatus = "searching";
        let elapsedSeconds = 0;
        let playbackInterval = null;
        let currentSide = 'A';

        // Tracks of "Paolo Conte - Collezione"
        const tracksA = [
            { name: "Azzurra (Una Mattina)", duration: 225 },       // 3:45
            { name: "Sparring Partner", duration: 251 },            // 4:11
            { name: "Via Con Me (It's Wonderful)", duration: 166 }, // 2:46
            { name: "Boogie", duration: 312 },                     // 5:12
            { name: "Bartali", duration: 182 }                      // 3:02
        ];
        const tracksB = [
            { name: "Gelato al Limon", duration: 312 },             // 5:12
            { name: "Let's Fall in Love", duration: 207 },          // 3:27
            { name: "Genova Per Noi", duration: 178 },              // 2:58
            { name: "Max", duration: 225 },                         // 3:45
            { name: "La Donna d'Inverno", duration: 189 }           // 3:09
        ];

        let currentTracks = tracksA;

        // Format seconds to mm:ss
        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        // Build tracklist UI
        function buildTracklist() {
            const tracklistContainer = document.getElementById('tracklist-container');
            tracklistContainer.innerHTML = '';
            currentTracks.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'track-item';
                item.id = `track-${index}`;
                item.innerHTML = `
                    <span class="track-number">${index + 1}</span>
                    <span class="track-name">${track.name}</span>
                    <span class="track-time">${formatTime(track.duration)}</span>
                `;
                item.onclick = () => {
                    selectTrack(index);
                };
                tracklistContainer.appendChild(item);
            });
        }

        // Handle side switching
        function switchSide(side) {
            if (currentSide === side) return;
            currentSide = side;
            currentTracks = (side === 'A') ? tracksA : tracksB;
            
            // Toggle active button class
            document.getElementById('btn-side-a').classList.toggle('active', side === 'A');
            document.getElementById('btn-side-b').classList.toggle('active', side === 'B');
            
            // Rebuild tracklist and reset time estimation
            buildTracklist();
            elapsedSeconds = 0;
            updatePlaybackProgress();
        }

        // Handle manual track selection
        function selectTrack(index) {
            let accumulated = 0;
            for (let i = 0; i < index; i++) {
                accumulated += currentTracks[i].duration;
            }
            elapsedSeconds = accumulated;
            updatePlaybackProgress();
        }

        // Set local IP info
        document.getElementById('ip-info').innerText = "Web Interface: http://" + window.location.hostname + ":5000";

        // Build initial tracklist
        buildTracklist();

        // Estimate active track based on elapsed seconds since connection
        function updatePlaybackProgress() {
            if (currentStatus !== 'connected') return;

            elapsedSeconds++;
            
            let totalAlbumTime = currentTracks.reduce((acc, t) => acc + t.duration, 0);
            let timeInLoop = elapsedSeconds % totalAlbumTime;
            
            let accumulatedTime = 0;
            let activeTrackIndex = 0;
            let trackElapsed = 0;

            for (let i = 0; i < currentTracks.length; i++) {
                if (timeInLoop >= accumulatedTime && timeInLoop < accumulatedTime + currentTracks[i].duration) {
                    activeTrackIndex = i;
                    trackElapsed = timeInLoop - accumulatedTime;
                    break;
                }
                accumulatedTime += currentTracks[i].duration;
            }

            const activeTrack = currentTracks[activeTrackIndex];

            // Update UI elements
            document.getElementById('current-track-title').innerText = activeTrack.name;
            document.getElementById('time-elapsed').innerText = formatTime(trackElapsed);
            document.getElementById('time-total').innerText = formatTime(activeTrack.duration);

            // Progress bar fill
            const pct = (trackElapsed / activeTrack.duration) * 100;
            document.getElementById('track-progress').style.width = `${pct}%`;

            // Update active tracklist item highlight
            currentTracks.forEach((_, idx) => {
                const el = document.getElementById(`track-${idx}`);
                if (el) {
                    if (idx === activeTrackIndex) {
                        el.classList.add('active');
                    } else {
                        el.classList.remove('active');
                    }
                }
            });
        }

        async function updateStatus() {
            try {
                const response = await fetch('/api/status');
                if (!response.ok) throw new Error("Network response was not ok");
                
                const data = await response.json();
                
                const searchingPanel = document.getElementById('state-searching');
                const connectedPanel = document.getElementById('state-connected');
                
                if (data.status === 'connected') {
                    document.body.classList.add('connected');
                    if (currentStatus !== 'connected') {
                        // Reset timer and start playback loop
                        elapsedSeconds = 0;
                        if (playbackInterval) clearInterval(playbackInterval);
                        playbackInterval = setInterval(updatePlaybackProgress, 1000);
                        
                        searchingPanel.classList.remove('active');
                        setTimeout(() => {
                            connectedPanel.classList.add('active');
                        }, 300);
                        currentStatus = 'connected';
                        
                        // Initial update
                        updatePlaybackProgress();
                    }
                } else {
                    document.body.classList.remove('connected');
                    if (currentStatus !== 'searching') {
                        if (playbackInterval) {
                            clearInterval(playbackInterval);
                            playbackInterval = null;
                        }
                        
                        connectedPanel.classList.remove('active');
                        setTimeout(() => {
                            searchingPanel.classList.add('active');
                        }, 300);
                        currentStatus = 'searching';
                    }
                }
            } catch (error) {
                console.error("Errore nel recupero dello stato:", error);
            }
        }

        // Poll status every 1.5 seconds
        setInterval(updateStatus, 1500);
        updateStatus(); // Initial call
    </script>
</body>
</html>
